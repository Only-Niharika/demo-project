<!DOCTYPE html>
<html>
<head>
    <title>Student Portal Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
        }

        p {
            color: #555;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            margin: 15px 0;
        }

        a {
            text-decoration: none;
            color: white;
            background: #3498db;
            padding: 10px 15px;
            border-radius: 5px;
            display: inline-block;
        }

        a:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Student Portal Dashboard</h1>
        <p>Here you can access your courses, grades, and other resources.</p>

        <ul>
            <li><a href="#courses">My Courses</a></li>
            <li><a href="#grades">My Grades</a></li>
            <li><a href="#resources">Resources</a></li>
            <li><a href="index.html">Logout</a></li>
        </ul>
    </div>
</body>
</html>
